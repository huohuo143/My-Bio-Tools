name: Build and accept Windows 1.9.7 Build 26

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-1.9.7-build26
  cancel-in-progress: false

jobs:
  build-and-accept:
    runs-on: windows-latest
    timeout-minutes: 150
    env:
      MY_BIO_TOOLS_LICENSE_PUBLIC_JWK: ${{ vars.MY_BIO_TOOLS_LICENSE_PUBLIC_JWK }}
      AUTH_BASE_URL: https://mybiotools.aizs.top
      HAS_AUTHORIZED_TEST_ACCOUNT: ${{ secrets.MY_BIO_TOOLS_TEST_EMAIL != '' && secrets.MY_BIO_TOOLS_TEST_PASSWORD != '' }}

    steps:
      - name: Check out private source
        uses: actions/checkout@v4

      - name: Set up Python 3.12 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: packaging/runtime-requirements.txt

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install native build tools
        shell: pwsh
        run: |
          choco install mingw --no-progress -y
          choco install innosetup --no-progress -y

          $roots = @(
            "C:\ProgramData\mingw64",
            "C:\tools\mingw64",
            "C:\mingw64",
            "C:\ProgramData\chocolatey"
          ) | Where-Object { Test-Path $_ }
          $gpp = Get-ChildItem $roots -Filter g++.exe -File -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $gpp) {
            throw "MinGW-w64 installation completed but g++.exe was not found."
          }
          $gpp.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6"
          if (-not (Test-Path (Join-Path $iscc "ISCC.exe"))) {
            throw "Inno Setup 6 installation completed but ISCC.exe was not found."
          }
          $iscc | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Validate production public key boundary
        shell: pwsh
        run: |
          if (-not $env:MY_BIO_TOOLS_LICENSE_PUBLIC_JWK) {
            throw "Repository variable MY_BIO_TOOLS_LICENSE_PUBLIC_JWK is missing."
          }
          $jwk = $env:MY_BIO_TOOLS_LICENSE_PUBLIC_JWK | ConvertFrom-Json
          if ($jwk.kty -ne "OKP" -or $jwk.crv -ne "Ed25519" -or -not $jwk.x) {
            throw "The configured value is not an Ed25519 public JWK."
          }
          if (@($jwk.PSObject.Properties.Name) -contains "d") {
            throw "A private JWK was supplied; refusing to build."
          }

      - name: Build installer and portable package
        shell: pwsh
        run: |
          ./script/build_windows.ps1 -AuthBaseUrl $env:AUTH_BASE_URL

      - name: Install and accept installer package
        shell: pwsh
        run: |
          $setup = Resolve-Path "dist/windows/My-Bio-Tools-1.9.7-build26-win-x64-setup.exe"
          $installDir = Join-Path $env:RUNNER_TEMP "My Bio Tools Installed"
          $installLog = Join-Path $env:RUNNER_TEMP "my-bio-tools-install.log"
          $arguments = @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/DIR=$installDir",
            "/LOG=$installLog"
          )
          $installer = Start-Process -FilePath $setup -ArgumentList $arguments -Wait -PassThru
          if ($installer.ExitCode -ne 0) {
            throw "Installer exited with code $($installer.ExitCode)."
          }
          if (-not (Test-Path (Join-Path $installDir "My Bio Tools.exe"))) {
            throw "Installed application executable was not found."
          }
          ./script/test_windows_runtime.ps1 -AppDir $installDir
          "MY_BIO_TOOLS_INSTALLED_DIR=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Extract and accept portable package
        shell: pwsh
        run: |
          $portableDir = Join-Path $env:RUNNER_TEMP "My Bio Tools Portable"
          Expand-Archive "dist/windows/My-Bio-Tools-1.9.7-build26-win-x64-portable.zip" $portableDir -Force
          ./script/test_windows_runtime.ps1 -AppDir $portableDir

      - name: Perform authorized login and protected runtime acceptance
        if: ${{ env.HAS_AUTHORIZED_TEST_ACCOUNT == 'true' }}
        shell: pwsh
        env:
          MY_BIO_TOOLS_TEST_EMAIL: ${{ secrets.MY_BIO_TOOLS_TEST_EMAIL }}
          MY_BIO_TOOLS_TEST_PASSWORD: ${{ secrets.MY_BIO_TOOLS_TEST_PASSWORD }}
        run: |
          ./script/test_windows_authorized_login.ps1 -AppDir $env:MY_BIO_TOOLS_INSTALLED_DIR

      - name: Record authorized login gate
        if: ${{ env.HAS_AUTHORIZED_TEST_ACCOUNT != 'true' }}
        shell: pwsh
        run: |
          "## Authorized login acceptance" >> $env:GITHUB_STEP_SUMMARY
          "Skipped because the private repository does not contain both test-account secrets." >> $env:GITHUB_STEP_SUMMARY
          "Required secret names: MY_BIO_TOOLS_TEST_EMAIL and MY_BIO_TOOLS_TEST_PASSWORD." >> $env:GITHUB_STEP_SUMMARY

      - name: Verify checksums and package metadata
        shell: pwsh
        run: |
          $dist = Resolve-Path "dist/windows"
          $expected = @(
            "My-Bio-Tools-1.9.7-build26-win-x64-setup.exe",
            "My-Bio-Tools-1.9.7-build26-win-x64-portable.zip"
          )
          foreach ($name in $expected) {
            $path = Join-Path $dist $name
            if (-not (Test-Path $path)) { throw "Missing artifact: $name" }
            $hash = (Get-FileHash $path -Algorithm SHA256).Hash.ToLowerInvariant()
            "- ``$name``: ``$hash``" >> $env:GITHUB_STEP_SUMMARY
          }

          $manifest = Get-Content (Join-Path $dist "version-manifest.json") -Raw | ConvertFrom-Json
          if ($manifest.version -ne "1.9.7" -or $manifest.build -ne 26 -or $manifest.platform -ne "win-x64") {
            throw "Version manifest does not identify 1.9.7 Build 26 for win-x64."
          }
          "" >> $env:GITHUB_STEP_SUMMARY
          "Installer, portable package, guest UI startup, and shutdown cleanup passed." >> $env:GITHUB_STEP_SUMMARY

      - name: Upload private Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: My-Bio-Tools-1.9.7-build26-win-x64
          path: dist/windows/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
